<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Registration Form</title>

    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        *{
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 shadow p-5 border-secondary">
                <h3 class="text-center"> <b> Patient Registration Form</b></h3>
                <form action="">
                    <div class="container">
                        <div class="row">
                            <div class="col-lg-6 mt-4">
                                <label for="">Enter name</label>
                                <input type="text" class="form-control" placeholder="Enter name" />
                            </div>
                            <div class="col-lg-6 mt-4">
                                <label for="">Last name</label>
                                <input type="text" class="form-control" placeholder="Last name" />
                            </div>
                            <div class="col-lg-6 mt-4">
                                <label for="">Date of Birth</label>
                                <input type="date" class="form-control" placeholder="Date of Birth" />
                            </div>
                            <br>
                            <br>
                            <div class="col-lg-12 mt-4">
                                <label for="">Gender</label>
                                <br>
                                <div></div>
                                <div style="display: inline;"><input type="radio" class="form-chek" name="gender"  />Male
                                </div>
                                <input type="radio" class="form-chek ml-4"
                                    name="gender" style="margin-left: 50px;"/>Female
                                <input type="radio" class="form-chek  ml-4" 
                                    name="gender" style="margin-left: 50px;" />Other
                            </div>
                            <div class="col-lg-12 mt-4">
                                <label for="">Email Address</label>
                                <input type="email" class="form-control" placeholder="Enter email" />
                            </div>
                            <div class="col-lg-12 mt-4">
                                <label for="">Phone Number</label>
                                <input type="number" class="form-control" placeholder="+91" />
                            </div>
                            <div class="col-lg-12 mt-4">
                                <label for="">Address</label>
                                <textarea name="" id="" placeholder="Enter Your Address"
                                    class="form-control"></textarea>
                            </div>
                            <div class="col-lg-12 mt-4">
                                <label for="">Emergency Contact Number</label>
                                <input type="number" class="form-control" placeholder="+91" />
                            </div>
                            <div class="col-lg-12 mt-4">
                                <input type="checkbox" />I consent to the processing of my personal data in accordance with the Private
                                    policy.
                            </div>
                            <div class="text-center">

                                <input type="submit" value="Register" class=" btn btn-primary" />
                            </div>
                        </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
