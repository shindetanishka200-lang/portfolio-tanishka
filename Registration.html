<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<body style="background-color: blueviolet;"> 
    <center>
    <div style="background-color: white; margin-top: 30px;">
    <h1 style="color:blueviolet;"><u>STUDENT REGISTRATION FORM</u></h1>
    </div>
    </center>
    <form action="">
    <table style="color: white;">
        <tr>
            <td>
                <label for="">FIRST NAME</label>
            </td>
            <td>
                <input type="text">
            </td>
        </tr>
        <tr>
            <td>
                <label for="">LAST NAME</label>
            </td>
            <td>
                <input type="text">
            </td>
        </tr>
        <tr>
            <td>
                <label for="">DATE OF BIRTH</label>
                </td>
                <td>
                <input type="date" >
            </td>
        </tr>
        <tr>
            <td>
                <label for="">EMAIL ID</label>
                </td>
                <td>
                <input type="email">
            </td>
        </tr>
        <tr>
            <td>
                <label for="">MOBILE NUMBER</label>
                </td>
                <td>
                <input type="number">
            </td>
        </tr>
        <tr>
            <td>
                <label for="">GENDER</label>
                </td>
                <td>
                <input type="radio" name="gender">MALE
                <input type="radio" name="gender">FEMALE
            </td>
        </tr>
        <tr>
            <td>
            <label for="">ADDRESS</label>
            </td>
            <td>
                <textarea name="" id=""></textarea>
            </td>
        </tr>
        <tr>
            <td>
                <label for="">CITY</label>
            </td>
            <td>
                <input type="text">
            </td>
        </tr>
        <tr>
            <td>
                <label for="">PIN CODE</label>
            </td>
            <td>
                <input type="number">
            </td>
        </tr>
        <tr>
            <td>
                <label for="">STATE</label>
            </td>
            <td>
                <input type="text">
            </td>
        </tr>
        <tr>
            <td>
                <label for="">COUNDRY</label>
            </td>
            <td><input type="text" placeholder="INDIA"></td>
        </tr>
        <tr>
            <td>
          <label for="">HOBIES</label>
          </td>
          <td>
            <input type="checkbox">Drawing
            <input type="checkbox">Singing
            <input type="checkbox">Dancing <br>
            <input type="checkbox">Sketching 
            <input type="checkbox">other <br>
            <input type="text">
          </td> 
        </tr> 
        <tr>
            <td rowspan="5">
                <label for="">QUALIFICATION</label>
            </td>
            <th>Sr.No.</th> <th>Examination</th>
            <th>Board</th>
            <th>Percentage</th>
            <th>Year of Passing</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Class X</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>2</td>
            <td>Class XII</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>3</td>
            <td>Graduation</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>4</td>
            <td>MAsters</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>
                <label for="">COURSES APPLIED FOR</label>
            </td>
            <td>
                <input type="radio" name="courses">BCA
                <input type="radio" name="courses">B.Com
                <input type="radio" name="courses">B.A.
                <input type="radio" name="courses">B.Sc
            </td>
        </tr>
        <br>
        <tr>
            <td></td>
            <td>
                <input type="submit">
                <input type="reset">
            </td>
        </tr>
    </table>
    </form>
</body>
</html>
